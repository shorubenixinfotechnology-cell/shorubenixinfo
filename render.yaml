services:
  - type: web
    name: shorubenix-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
        placeholder: "Enter your MongoDB Atlas Connection String here"
      - key: MONGODB_DB
        value: shorubenix
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        value: shorubenixinfotechnology@gmail.com
      - key: SMTP_PASSWORD
        value: "kdun uzfu gwev upnv"
